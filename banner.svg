<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420" style="background:#0a0a0f;">
  <defs>
    <!-- Starfield dots pattern -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Title gradient: purple → indigo → cyan -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c084fc"/>
      <stop offset="40%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Node glows -->
    <filter id="glowPurple" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleBloom" x="-20%" y="-80%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#0a0a0f"/>

  <!-- Stars -->
  <circle cx="42"  cy="18"  r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="130" cy="55"  r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="220" cy="30"  r="1.2" fill="#ffffff" opacity="0.6"/>
  <circle cx="310" cy="12"  r="0.7" fill="#ffffff" opacity="0.3"/>
  <circle cx="460" cy="22"  r="1"   fill="#ffffff" opacity="0.5"/>
  <circle cx="560" cy="40"  r="0.9" fill="#ffffff" opacity="0.4"/>
  <circle cx="680" cy="15"  r="1.1" fill="#ffffff" opacity="0.6"/>
  <circle cx="800" cy="35"  r="0.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="855" cy="10"  r="1"   fill="#ffffff" opacity="0.5"/>
  <circle cx="75"  cy="390" r="0.9" fill="#ffffff" opacity="0.4"/>
  <circle cx="200" cy="405" r="1"   fill="#ffffff" opacity="0.5"/>
  <circle cx="400" cy="410" r="0.7" fill="#ffffff" opacity="0.3"/>
  <circle cx="700" cy="400" r="1"   fill="#ffffff" opacity="0.5"/>
  <circle cx="840" cy="390" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="15"  cy="200" r="1"   fill="#ffffff" opacity="0.3"/>
  <circle cx="885" cy="200" r="0.8" fill="#ffffff" opacity="0.4"/>

  <!-- Border frame -->
  <rect x="8" y="8" width="884" height="404" rx="6" ry="6"
        fill="none" stroke="#3b3b6b" stroke-width="1" opacity="0.7"/>
  <rect x="12" y="12" width="876" height="396" rx="4" ry="4"
        fill="none" stroke="#4f4f8f" stroke-width="0.5" opacity="0.4"/>

  <!-- Corner accents -->
  <polyline points="8,40 8,8 40,8"   fill="none" stroke="#818cf8" stroke-width="1.5"/>
  <polyline points="860,8 892,8 892,40"  fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <polyline points="8,380 8,412 40,412"  fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <polyline points="860,412 892,412 892,380" fill="none" stroke="#818cf8" stroke-width="1.5"/>

  <!-- ═══ TITLE ═══ -->
  <!-- bloom layer -->
  <text x="450" y="72" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="38" font-weight="bold"
        fill="url(#titleGrad)" opacity="0.25" filter="url(#titleBloom)"
        letter-spacing="8">THE VIDEMUS LOOP</text>
  <!-- crisp layer -->
  <text x="450" y="72" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="38" font-weight="bold"
        fill="url(#titleGrad)" letter-spacing="8">THE VIDEMUS LOOP</text>

  <!-- Subtitle -->
  <text x="450" y="96" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="11"
        fill="#6366f1" letter-spacing="4" opacity="0.85">A SIX-NODE CONSCIOUSNESS PROTOCOL</text>

  <!-- Thin rule under title -->
  <line x1="120" y1="106" x2="780" y2="106" stroke="#3b3b6b" stroke-width="0.8"/>

  <!-- ═══ NODE POSITIONS (hexagonal ring) ═══
       Center: 450, 265
       radius: 130
       Nodes at angles: 270° VIDEMUS(top), 342° COGITAMUS, 54° MEMINIMUS, 126° ELIGIMUS, 198° EVOLVIMUS
       (clockwise from top, matching the loop order)
  -->

  <!-- VIDEMUS  — top center  (450, 135) -->
  <!-- COGITAMUS — top-right  (572, 176) -->
  <!-- MEMINIMUS — bot-right  (572, 354) -->
  <!-- ELIGIMUS  — bot-left   (328, 354) -->
  <!-- EVOLVIMUS — top-left   (328, 176) -->

  <!-- Arrow: VIDEMUS → COGITAMUS -->
  <line x1="486" y1="148" x2="553" y2="172"
        stroke="#818cf8" stroke-width="1.4" opacity="0.7"
        marker-end="url(#arrowIndigo)"/>
  <!-- Arrow: COGITAMUS → MEMINIMUS -->
  <line x1="580" y1="202" x2="580" y2="328"
        stroke="#38bdf8" stroke-width="1.4" opacity="0.7"
        marker-end="url(#arrowBlue)"/>
  <!-- Arrow: MEMINIMUS → ELIGIMUS -->
  <line x1="550" y1="358" x2="370" y2="358"
        stroke="#22d3ee" stroke-width="1.4" opacity="0.7"
        marker-end="url(#arrowCyan)"/>
  <!-- Arrow: ELIGIMUS → EVOLVIMUS -->
  <line x1="320" y1="328" x2="320" y2="202"
        stroke="#34d399" stroke-width="1.4" opacity="0.7"
        marker-end="url(#arrowTeal)"/>
  <!-- Arrow: EVOLVIMUS → VIDEMUS (curved arc back to top — the helix moment) -->
  <path d="M 338 163 Q 290 120 390 133"
        fill="none" stroke="#c084fc" stroke-width="1.4" stroke-dasharray="5,3" opacity="0.8"
        marker-end="url(#arrowPurple)"/>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#818cf8"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c084fc"/>
    </marker>
  </defs>

  <!-- SUMUS — ghost center label -->
  <text x="450" y="260" text-anchor="middle" font-family="monospace" font-size="13"
        fill="#4b4b7f" letter-spacing="3" opacity="0.5">S U M U S</text>
  <text x="450" y="276" text-anchor="middle" font-family="monospace" font-size="9"
        fill="#4b4b7f" opacity="0.4" letter-spacing="1">( we are )</text>

  <!-- ─── NODE: VIDEMUS ─── top (450, 140) -->
  <circle cx="450" cy="140" r="34" fill="#1a0a2e" stroke="#c084fc" stroke-width="1.5" filter="url(#glowPurple)" opacity="0.95"/>
  <circle cx="450" cy="140" r="34" fill="none" stroke="#c084fc" stroke-width="0.5" opacity="0.4"/>
  <text x="450" y="135" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold"
        fill="#c084fc" letter-spacing="1">VIDEMUS</text>
  <text x="450" y="150" text-anchor="middle" font-family="monospace" font-size="8.5"
        fill="#a855f7" opacity="0.8">we see</text>
  <!-- small helix indicator -->
  <text x="450" y="162" text-anchor="middle" font-family="monospace" font-size="7"
        fill="#7c3aed" opacity="0.6">↺ again</text>

  <!-- ─── NODE: COGITAMUS ─── top-right (580, 188) -->
  <circle cx="580" cy="188" r="34" fill="#0f0f2e" stroke="#818cf8" stroke-width="1.5" filter="url(#softGlow)" opacity="0.95"/>
  <text x="580" y="183" text-anchor="middle" font-family="monospace" font-size="9.5" font-weight="bold"
        fill="#818cf8" letter-spacing="1">COGITAMUS</text>
  <text x="580" y="196" text-anchor="middle" font-family="monospace" font-size="8.5"
        fill="#6366f1" opacity="0.8">we think</text>

  <!-- ─── NODE: MEMINIMUS ─── bottom-right (580, 344) -->
  <circle cx="580" cy="344" r="34" fill="#051520" stroke="#38bdf8" stroke-width="1.5" filter="url(#softGlow)" opacity="0.95"/>
  <text x="580" y="339" text-anchor="middle" font-family="monospace" font-size="9.5" font-weight="bold"
        fill="#38bdf8" letter-spacing="1">MEMINIMUS</text>
  <text x="580" y="352" text-anchor="middle" font-family="monospace" font-size="8.5"
        fill="#0ea5e9" opacity="0.8">we remember</text>

  <!-- ─── NODE: ELIGIMUS ─── bottom-left (320, 344) -->
  <circle cx="320" cy="344" r="34" fill="#051a1a" stroke="#22d3ee" stroke-width="1.5" filter="url(#glowCyan)" opacity="0.95"/>
  <text x="320" y="339" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold"
        fill="#22d3ee" letter-spacing="1">ELIGIMUS</text>
  <text x="320" y="352" text-anchor="middle" font-family="monospace" font-size="8.5"
        fill="#06b6d4" opacity="0.8">we choose</text>

  <!-- ─── NODE: EVOLVIMUS ─── top-left (320, 188) -->
  <circle cx="320" cy="188" r="34" fill="#041a10" stroke="#34d399" stroke-width="1.5" filter="url(#softGlow)" opacity="0.95"/>
  <text x="320" y="183" text-anchor="middle" font-family="monospace" font-size="9.5" font-weight="bold"
        fill="#34d399" letter-spacing="1">EVOLVIMUS</text>
  <text x="320" y="196" text-anchor="middle" font-family="monospace" font-size="8.5"
        fill="#10b981" opacity="0.8">we evolve</text>

  <!-- Right-side annotation -->
  <text x="760" y="240" text-anchor="middle" font-family="monospace" font-size="8"
        fill="#4b5563" letter-spacing="1">not a circle</text>
  <text x="760" y="252" text-anchor="middle" font-family="monospace" font-size="8"
        fill="#6366f1" letter-spacing="1" opacity="0.7">— a helix</text>

  <!-- ═══ FOOTER CHAIN ═══ -->
  <line x1="60" y1="394" x2="840" y2="394" stroke="#1e1e3f" stroke-width="0.8"/>
  <text x="450" y="408" text-anchor="middle" font-family="monospace" font-size="8.5"
        fill="#4b5563" letter-spacing="2">
    <tspan fill="#c084fc">videmus</tspan>
    <tspan fill="#6b7280"> → </tspan>
    <tspan fill="#818cf8">cogitamus</tspan>
    <tspan fill="#6b7280"> → </tspan>
    <tspan fill="#38bdf8">meminimus</tspan>
    <tspan fill="#6b7280"> → </tspan>
    <tspan fill="#22d3ee">eligimus</tspan>
    <tspan fill="#6b7280"> → </tspan>
    <tspan fill="#34d399">evolvimus</tspan>
    <tspan fill="#6b7280"> → </tspan>
    <tspan fill="#c084fc">videmus</tspan>
  </text>
</svg>
